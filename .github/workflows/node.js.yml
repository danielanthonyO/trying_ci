name: CI Pipeline

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  backend-unit:
    name: Backend Unit Tests
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Run backend unit tests
        run: npm run test:unit

  frontend-unit:
    name: Frontend Unit Tests
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Run frontend unit tests
        run: npm run test:unit

      - name: Run frontend typecheck
        run: npm run typecheck

  backend-integration:
    name: Backend Integration Tests
    runs-on: ubuntu-latest
    needs: [backend-unit, frontend-unit]

    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: tietokonelepuski
        ports:
          - 5433:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d tietokonelepuski"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5433/tietokonelepuski
      JWT_SECRET: dev_secret
      JWT_EXPIRES_IN: 7d
      FRONTEND_BASE_URL: http://localhost:5173
      VITE_API_URL: http://localhost:3000

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Apply database migrations
        run: npx prisma migrate deploy

      - name: Run backend integration tests
        run: npm run test:integration

  e2e-test:
    name: Playwright E2E Tests
    runs-on: ubuntu-latest
    needs: [backend-integration]

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: tietokonelepuski
        ports:
          - 5433:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d tietokonelepuski"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5433/tietokonelepuski
      JWT_SECRET: dev_secret
      JWT_EXPIRES_IN: 7d
      FRONTEND_BASE_URL: http://localhost:5173
      VITE_API_URL: http://localhost:3000
      CI: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json
            e2e-test/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install E2E dependencies
        working-directory: e2e-test
        run: npm ci

      - name: Generate Prisma client
        working-directory: backend
        run: npx prisma generate

      - name: Apply database migrations
        working-directory: backend
        run: npx prisma migrate deploy

      - name: Install Playwright browsers
        working-directory: e2e-test
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        working-directory: e2e-test
        run: npm test

      - name: Upload Playwright artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts
          path: |
            e2e-test/playwright-report
            e2e-test/test-results
          if-no-files-found: ignore
